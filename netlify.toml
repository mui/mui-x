[build]
  # The deploy-ready HTML files and assets generated by the build.
  publish = "docs/export/"

  # Build command. The docs static export is built in memory-bounded shards
  # (see docs/scripts/buildShardedDocs.mjs) to stay well under the build
  # container's memory limit.
  command = "pnpm docs:build:sharded"

[build.environment]
  NODE_VERSION = "22.23.1"
  PNPM_FLAGS = "--frozen-lockfile"
  # Each shard is a single-worker `next build`.
  NODE_OPTIONS = "--max-old-space-size=8192"
  NEXT_PARALLELISM = "1"

# disabled because of https://github.com/mui/mui-public/issues/809
# TODO: Re-enable after either:
#   - we notice PR previews in Netlify restore caches from master branch and not from docs-v8
