<svg viewBox="0 0 920 210" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#566371"/>
    </marker>
  </defs>

  <!-- Step 1: Edit -->
  <rect x="20" y="30" width="200" height="150" rx="8" fill="#101418" stroke="#303740" stroke-width="1.5"/>
  <circle cx="46" cy="56" r="12" fill="#66B2FF"/>
  <text x="46" y="60.5" text-anchor="middle" font-size="12" font-weight="600" fill="#101418">1</text>
  <text x="66" y="61" font-size="14" font-weight="600" fill="#F3F6F9">Edit</text>
  <text x="36" y="90" font-size="12" fill="#B0B8C4">The editor opens on the</text>
  <text x="36" y="108" font-size="12" fill="#B0B8C4">formula source, not on the</text>
  <text x="36" y="126" font-size="12" fill="#B0B8C4">evaluated value.</text>
  <rect x="36" y="140" width="168" height="24" rx="5" fill="#132F4C"/>
  <text x="120" y="156" text-anchor="middle" font-size="11" font-family="Menlo, Consolas, monospace" fill="#66B2FF">=B1 * C1</text>

  <line x1="220" y1="105" x2="246" y2="105" stroke="#566371" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 2: Commit -->
  <rect x="250" y="30" width="200" height="150" rx="8" fill="#101418" stroke="#303740" stroke-width="1.5"/>
  <circle cx="276" cy="56" r="12" fill="#66B2FF"/>
  <text x="276" y="60.5" text-anchor="middle" font-size="12" font-weight="600" fill="#101418">2</text>
  <text x="296" y="61" font-size="14" font-weight="600" fill="#F3F6F9">Commit</text>
  <text x="266" y="90" font-size="12" fill="#B0B8C4">A1 references freeze to</text>
  <text x="266" y="108" font-size="12" fill="#B0B8C4">canonical form and the</text>
  <text x="266" y="126" font-size="12" fill="#B0B8C4">source is written to the row.</text>
  <rect x="266" y="140" width="168" height="24" rx="5" fill="#132F4C"/>
  <text x="350" y="156" text-anchor="middle" font-size="11" font-family="Menlo, Consolas, monospace" fill="#66B2FF">=REF(COLUMN("price"), …)</text>

  <line x1="450" y1="105" x2="476" y2="105" stroke="#566371" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 3: Re-evaluate -->
  <rect x="480" y="30" width="200" height="150" rx="8" fill="#101418" stroke="#303740" stroke-width="1.5"/>
  <circle cx="506" cy="56" r="12" fill="#66B2FF"/>
  <text x="506" y="60.5" text-anchor="middle" font-size="12" font-weight="600" fill="#101418">3</text>
  <text x="526" y="61" font-size="14" font-weight="600" fill="#F3F6F9">Re-evaluate</text>
  <text x="496" y="90" font-size="12" fill="#B0B8C4">The engine recomputes the</text>
  <text x="496" y="108" font-size="12" fill="#B0B8C4">edited cell and its dependents</text>
  <text x="496" y="126" font-size="12" fill="#B0B8C4">in dependency order —</text>
  <text x="496" y="144" font-size="12" fill="#B0B8C4">nothing else is touched.</text>

  <line x1="680" y1="105" x2="706" y2="105" stroke="#566371" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 4: Render -->
  <rect x="710" y="30" width="190" height="150" rx="8" fill="#101418" stroke="#303740" stroke-width="1.5"/>
  <circle cx="736" cy="56" r="12" fill="#66B2FF"/>
  <text x="736" y="60.5" text-anchor="middle" font-size="12" font-weight="600" fill="#101418">4</text>
  <text x="756" y="61" font-size="14" font-weight="600" fill="#F3F6F9">Render</text>
  <text x="726" y="90" font-size="12" fill="#B0B8C4">Only cells whose result</text>
  <text x="726" y="108" font-size="12" fill="#B0B8C4">changed re-render, and</text>
  <text x="726" y="126" font-size="12" fill="#B0B8C4">sorting, filtering, and</text>
  <text x="726" y="144" font-size="12" fill="#B0B8C4">aggregation are refreshed.</text>
</svg>
