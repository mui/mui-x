name: CI

on:
  push:
    branches-ignore:
      # Renovate branches are always Pull Requests.
      # We don't need to run CI twice (push+pull_request)
      - 'renovate/**'
      - 'dependabot/**'
  pull_request:

permissions: {}

jobs:
  continuous-releases:
    uses: mui/mui-public/.github/workflows/ci-base.yml@gh-actions
    with:
      node_version: '22'
      os: ubuntu-latest
