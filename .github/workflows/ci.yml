name: CI

on:
  push:
    branches-ignore:
      # Renovate branches are always Pull Requests.
      # We don't need to run CI twice (push+pull_request)
      - 'renovate/**'
  pull_request:

permissions: {}

jobs:
  continuous-releases:
    name: Continuous releases
    if: ${{ github.repository_owner == 'mui' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ github.actor }}"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # fetch all tags which are required for `pnpm release:changelog`
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.23.1'
          # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-dependencies
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm release:build
      - name: Publish packages to pkg.pr.new
        uses: mui/mui-public/.github/actions/ci-publish@2543f4364e265ee3ed091cb080536009835ec614 # master

  # Mirrors the real publish workflow environment (`publish.yml`) so an env
  # mismatch — e.g. the Node version pinned by `publish-prepare` violating our
  # engineStrict `engines` range — is caught here instead of during publishing.
  publish-dry-run:
    name: Publish Dry Run

    if: ${{ github.repository_owner == 'mui' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Prepare for publishing
        uses: mui/mui-public/.github/actions/publish-prepare@2543f4364e265ee3ed091cb080536009835ec614 # master
        with:
          # Must satisfy the `engines.node` range enforced by pnpm engineStrict
          node-version: '22.23.1'
      - name: Dry run npm publishing
        env:
          IS_PUBLISH_TEST: 'true'
        run: pnpm code-infra publish --ci --dry-run
