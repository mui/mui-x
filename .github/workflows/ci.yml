name: CI

on:
  push:
    branches-ignore:
      # Renovate branches are always Pull Requests.
      # We don't need to run CI twice (push+pull_request)
      - 'renovate/**'
      - 'dependabot/**'
  pull_request:

permissions: {}

jobs:
  continuous-releases:
    name: Continuous Releases
    uses: mui/mui-public/.github/workflows/ci-base.yml@use-pnpm-pack
    with:
      node-version: '22'
