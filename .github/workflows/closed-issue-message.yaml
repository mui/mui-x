name: Add closing message to issue

on:
  issues:
    types:
      - closed

permissions: {}

jobs:
  add-comment:
    name: Add closing message
    if: github.event.issue.state_reason == 'completed'
    uses: mui/mui-public/.github/workflows/issues_add-closing-message.yml@48d2c586cbe5ba0a800c4973499178dd4cdb89bf # master
    permissions:
      contents: read
      issues: write
