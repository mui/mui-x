name: Add closing message to issue

on:
  issues:
    types:
      - closed

permissions: {}

jobs:
  add-comment:
    name: Add closing message
    if: github.event.issue.state_reason == 'completed'
    uses: mui/mui-public/.github/workflows/issues_add-closing-message.yml@3e5ffed8f8d4b9cd2eb2119f8b68089c0be12701
    permissions:
      contents: read
      issues: write
