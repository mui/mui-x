name: Add closing message to issue

on:
  issues:
    types:
      - closed

permissions: {}

jobs:
  add-comment:
    name: Add closing message
    if: github.event.issue.state_reason == 'completed'
    uses: mui/mui-public/.github/workflows/issues_add-closing-message.yml@0eed58c5bf2f7f3bfa60887e07808b0d6b4a078b
    permissions:
      contents: read
      issues: write
