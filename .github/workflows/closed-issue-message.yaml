name: Add closing message to issue

on:
  issues:
    types:
      - closed

permissions: {}

jobs:
  add-comment:
    name: Add closing message
    if: github.event.issue.state_reason == 'completed'
    uses: mui/mui-public/.github/workflows/issues_add-closing-message.yml@a24bc8adf051b6b19ebdae8a80aaa2650d9b2ae7
    permissions:
      contents: read
      issues: write
